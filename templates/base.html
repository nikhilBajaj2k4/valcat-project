<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lead List QA & Scoring{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --panel-2: #1f232c;
      --border: #2a2f3a;
      --text: #e7eaf0;
      --muted: #9aa3b2;
      --accent: #6ea8fe;
      --accent-2: #5b8def;
      --t1-bg: #143d2c; --t1-fg: #6dd49a; --t1-bd: #1f6243;
      --t2-bg: #3a3320; --t2-fg: #f3c969; --t2-bd: #6a5b30;
      --t3-bg: #3a1f20; --t3-fg: #f08a8a; --t3-bd: #6a3033;
      --danger: #f08a8a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 28px 24px 64px; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    header h1 { margin: 0; font-size: 20px; letter-spacing: -0.01em; }
    header .sub { color: var(--muted); font-size: 13px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 22px; }
    .grid { display: grid; gap: 16px; }
    .grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .grid.cols-2 { grid-template-columns: 1fr 1fr; }
    @media (max-width: 720px) { .grid.cols-3, .grid.cols-2 { grid-template-columns: 1fr; } }
    .btn { display: inline-block; background: var(--accent-2); color: white; border: 0; border-radius: 8px; padding: 10px 16px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .btn:hover { background: var(--accent); text-decoration: none; }
    .btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .error { background: #3a1f20; color: var(--danger); border: 1px solid #6a3033; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }
    .stat { background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .stat .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    .stat .value.small { font-size: 22px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; border: 1px solid; }
    .badge.tier-1 { background: var(--t1-bg); color: var(--t1-fg); border-color: var(--t1-bd); }
    .badge.tier-2 { background: var(--t2-bg); color: var(--t2-fg); border-color: var(--t2-bd); }
    .badge.tier-3 { background: var(--t3-bg); color: var(--t3-fg); border-color: var(--t3-bd); }
    .badge.muted { background: var(--panel-2); color: var(--muted); border-color: var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
    tr:hover td { background: rgba(110,168,254,0.04); }
    .score-bar { display: inline-block; width: 60px; height: 6px; background: var(--panel-2); border-radius: 3px; overflow: hidden; vertical-align: middle; margin-right: 6px; }
    .score-bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
    .muted { color: var(--muted); }
    .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .table-wrap { overflow-x: auto; }
    .row-num { color: var(--muted); font-variant-numeric: tabular-nums; }
    h2 { font-size: 15px; margin: 0 0 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .reasons li { margin: 6px 0; }
    .dropzone { border: 2px dashed var(--border); border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; background: var(--panel-2); transition: border-color 0.15s, background 0.15s; position: relative; }
    .dropzone.dragging { border-color: var(--accent); background: rgba(110,168,254,0.08); }
    .dropzone.has-file { border-style: solid; border-color: var(--t1-bd); background: rgba(20,61,44,0.4); cursor: default; }
    .dz-empty { display: block; }
    .dz-loaded { display: none; }
    .dropzone.has-file .dz-empty { display: none; }
    .dropzone.has-file .dz-loaded { display: block; }
    .dz-icon { font-size: 32px; line-height: 1; }
    .dz-title { margin-top: 10px; font-weight: 600; font-size: 16px; }
    .dz-help { color: var(--muted); font-size: 13px; margin-top: 6px; }
    .dz-filename { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--t1-fg); font-size: 15px; word-break: break-all; }
    .dz-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .dz-actions { display: flex; gap: 8px; justify-content: center; margin-top: 14px; }
    td.score-cell { white-space: nowrap; min-width: 200px; }
    .pts { display: inline-flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
    .pts .chip { display: inline-flex; align-items: center; gap: 4px; padding: 1px 7px; border-radius: 4px; font-size: 11px; font-variant-numeric: tabular-nums; border: 1px solid var(--border); background: var(--panel-2); color: var(--muted); }
    .pts .chip .label { opacity: 0.7; }
    .pts .chip.hot   { color: var(--t1-fg); border-color: var(--t1-bd); background: var(--t1-bg); }
    .pts .chip.warm  { color: var(--t2-fg); border-color: var(--t2-bd); background: var(--t2-bg); }
    .pts .chip.cold  { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Lead List QA &amp; Scoring</h1>
        <div class="sub">Clean, dedupe, score, enrich, tier.</div>
      </div>
      <a class="btn secondary" href="{{ url_for('index') }}">New upload</a>
    </header>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
